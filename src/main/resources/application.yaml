spring:
  application:
    name: yo-dispatcher-service
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
    connection-timeout: 5s
  cloud:
    function:
      definition: pack|label
    stream:
      bindings:
        packlabel-in-0:
          destination: order-accepted
          group: ${spring.application.name}
        packlabel-out-0:
          destination: order-dispatched

#    connection-timeout: 5s

logging:
  level:
    org.springframework.cloud.function: DEBUG
#    org.springframework.messaging.converter: DEBUG

server:
  port: 9003

